# 声明要使用的模块, 运行 zpull 自动拉取并递归解析依赖
# sparse: 只拉取列出的子目录 (路径相对于仓库根目录)
# always: 骨架路径, 用于 --tag template 和 --update-skeleton
# shallow: 骨架模式下只拉文件不拉子目录的路径
# 内部依赖 (path: xxx) 会自动追加 sparse checkout
modules:
  - repo: git@github-qingyu0310:qingyu0310/Zephyr_Components.git
    push_repo: git@github-qingyu0310:qingyu0310/Zephyr_Components.git
    ref: main
    sparse: [modules/led, modules/key, bsp/bsp_uart]
    always: [.vscode, .clangd, apps, boards, src, config, thread, CMakeLists.txt, prj.conf]
    shallow: [thread]
























